<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Triangulate — Three-Lens Player Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1815;
  --panel: #211e1a;
  --stripe: #1d1b17;
  --border: #34302a;
  --text: #f5f1ea;
  --dim: #a89e8a;
  --faint: #3a352e;
  --accent: #d97757;
  --pos: #7fb069;
  --neg: #c1666b;
  --warn: #d4a945;
  --info: #6fa8c7;
  --mute: #888;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg); color: var(--text);
       font-size: 15px; line-height: 1.55; }
.wrap { max-width: 1480px; margin: 0 auto; padding: 0 1.2em 4em 1.2em; }
header { border-bottom: 1px solid var(--border); padding: .9em 0; margin-bottom: 1em; }
h1 { color: var(--accent); margin: 0; font-size: 1.9em; font-weight: 700; }
h1 .sub { color: var(--dim); font-size: .55em; font-weight: 400; margin-left: .8em;
          letter-spacing: .12em; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; }
h2 { color: var(--text); margin-top: 1.6em; font-size: 1.15em; font-weight: 600;
     border-bottom: 1px solid var(--border); padding-bottom: .3em; letter-spacing: .01em; }
.meta { color: var(--dim); font-family: 'IBM Plex Mono', monospace; font-size: .82em;
        margin-top: .3em; letter-spacing: .04em; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
         padding: 1em 1.2em; margin: 1em 0; }
.grid2 { display: grid; grid-template-columns: 2fr 1fr; gap: 1em; }
@media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

/* Verdict bars */
.bar-row { display: grid; grid-template-columns: 200px 1fr 50px; align-items: center;
           gap: .8em; margin: .25em 0; font-family: 'IBM Plex Mono', monospace; font-size: .8em; }
.bar-row .label { color: var(--dim); text-align: right; white-space: nowrap; overflow: hidden;
                   text-overflow: ellipsis; }
.bar-row .bar { background: var(--faint); height: 14px; border-radius: 2px; overflow: hidden; }
.bar-row .bar > span { display: block; height: 100%; }
.bar-row .n { color: var(--text); font-variant-numeric: tabular-nums; }

.v-buy   { background: #4f8a4a; color: #fff; }
.v-hold  { background: #4a6c8a; color: #fff; }
.v-caut  { background: #b78c2c; color: #fff; }
.v-fade  { background: #9c3a3f; color: #fff; }
.v-mixed { background: #6a655c; color: #fff; }
.v-pill { padding: .12em .55em; border-radius: 3px; font-family: 'IBM Plex Mono', monospace;
          font-size: .78em; font-weight: 600; white-space: nowrap; }

/* Filter row */
.filters { display: flex; flex-wrap: wrap; gap: .8em; align-items: center;
           margin: .8em 0; font-family: 'IBM Plex Mono', monospace; font-size: .82em; }
.filters label { color: var(--dim); margin-right: .35em; text-transform: uppercase;
                  letter-spacing: .08em; font-size: .78em; }
.filters select, .filters input {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  padding: .35em .55em; border-radius: 3px; font-family: inherit; font-size: inherit;
}
.btn-group button {
  background: var(--panel); color: var(--dim); border: 1px solid var(--border);
  padding: .35em .8em; cursor: pointer; font-family: inherit; font-size: inherit;
}
.btn-group button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-group button:first-child { border-radius: 3px 0 0 3px; }
.btn-group button:last-child  { border-radius: 0 3px 3px 0; }
.btn-group button + button { border-left: 0; }

/* Player table */
table.players { border-collapse: collapse; width: 100%; margin-top: 1em;
                font-family: 'IBM Plex Mono', monospace; font-size: .82em; }
table.players th { background: var(--panel); padding: .55em .7em; text-align: left;
                    border-bottom: 1px solid var(--border); color: var(--dim);
                    text-transform: uppercase; letter-spacing: .08em; font-size: .75em;
                    cursor: pointer; user-select: none; position: sticky; top: 0; }
table.players th:hover { color: var(--text); }
table.players th .sort-arrow { color: var(--accent); margin-left: .25em; }
table.players td { padding: .45em .7em; border-bottom: 1px solid var(--faint);
                    font-variant-numeric: tabular-nums; }
table.players tr:nth-child(even) td { background: var(--stripe); }
table.players tr:hover td { background: #2a2620; }
.rationale { color: var(--dim); font-size: .9em; line-height: 1.3; max-width: 460px;
             font-family: 'Source Serif 4', Georgia, serif; }
.b-H  { color: var(--info); }
.b-SP { color: var(--warn); }
.b-RP { color: var(--accent); }
.traj-up   { color: var(--pos); }
.traj-down { color: var(--neg); }
.traj-flat { color: var(--mute); }
.ov-tag { background: var(--faint); color: var(--accent); padding: .1em .45em;
          border-radius: 2px; font-size: .72em; margin-left: .35em; }
.muted { color: var(--mute); }

.kv { display: flex; flex-direction: column; gap: .2em; font-family: 'IBM Plex Mono', monospace;
      font-size: .82em; }
.kv .row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--faint);
            padding: .2em 0; }
.kv .row .k { color: var(--dim); }
.kv .row .v { color: var(--text); }
.errbox { color: var(--neg); padding: 2em; text-align: center; font-family: 'IBM Plex Mono', monospace; }
</style>
</head><body>
<div class="wrap">
  <header>
    <h1>Triangulate <span class="sub">three-lens player audit</span></h1>
    <div class="meta" id="meta">loading…</div>
  </header>

  <div id="content" style="display:none;">
    <div class="grid2">
      <div class="panel">
        <h2 style="margin-top:0; border:0; padding:0;">Verdict distribution</h2>
        <div id="verdict-bars"></div>
      </div>
      <div class="panel">
        <h2 style="margin-top:0; border:0; padding:0;">Overrides</h2>
        <div id="override-table" class="kv"></div>
      </div>
    </div>

    <h2>Players <span class="meta" id="player-count" style="float:right;"></span></h2>

    <div class="filters">
      <span><label>TEAM</label><select id="f-team"><option value="">(all)</option></select></span>
      <span><label>BUCKET</label>
        <span class="btn-group" id="f-bucket">
          <button data-v="">All</button>
          <button data-v="H">H</button>
          <button data-v="SP">SP</button>
          <button data-v="RP">RP</button>
        </span>
      </span>
      <span><label>VERDICT</label><select id="f-verdict" multiple size="1" style="min-width:180px;"></select></span>
      <span><label>OVERRIDE</label><select id="f-override" multiple size="1" style="min-width:160px;"></select></span>
      <span><label>SEARCH</label><input id="f-name" type="text" placeholder="name…" size="14"></span>
      <span><button id="f-reset" style="cursor:pointer; background:var(--panel); color:var(--dim); border:1px solid var(--border); padding:.35em .8em; border-radius:3px; font-family:inherit;">RESET</button></span>
    </div>

    <table class="players" id="tbl">
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div id="err" class="errbox" style="display:none;"></div>
</div>

<script>
const COLS = [
  {k:'name',          h:'Name',     type:'str'},
  {k:'category',      h:'Team',     type:'str'},
  {k:'bucket',        h:'Bkt',      type:'str'},
  {k:'pl_rank',       h:'PL',       type:'num'},
  {k:'model_rank',    h:'Model',    type:'num'},
  {k:'arche_overall', h:'Arche',    type:'num'},
  {k:'arche_label',   h:'Label',    type:'str'},
  {k:'arche_traj',    h:'Traj',     type:'str'},
  {k:'verdict',       h:'Verdict',  type:'str'},
  {k:'arche_t1_fp',   h:'T+1',      type:'num'},
  {k:'rationale',     h:'Rationale',type:'str'},
];

let DATA = null;
let STATE = { sort_k:'model_rank', sort_dir:1, f_team:'', f_bucket:'', f_verdicts:new Set(), f_overrides:new Set(), f_name:'' };

function verdictClass(v) {
  if (!v) return 'v-mixed';
  const u = v.toUpperCase();
  if (u.includes('BUY') || u.includes('STRONG')) return 'v-buy';
  if (u.startsWith('HOLD')) return 'v-hold';
  if (u.includes('CAUTION')) return 'v-caut';
  if (u.includes('FADE')) return 'v-fade';
  return 'v-mixed';
}

function fmt(x, type) {
  if (x === null || x === undefined || x === '') return '<span class="muted">—</span>';
  if (type === 'num') {
    if (typeof x === 'number' && !Number.isInteger(x)) return x.toFixed(2);
  }
  return String(x);
}

function renderMeta() {
  const m = document.getElementById('meta');
  const d = DATA;
  m.innerHTML = `generated ${d.generated} &nbsp;·&nbsp; ${d.n_players} players` +
                (d.n_unresolved ? ` &nbsp;·&nbsp; ${d.n_unresolved} unresolved` : '') +
                ` &nbsp;·&nbsp; H ${d.bucket_counts?.H||0} / SP ${d.bucket_counts?.SP||0} / RP ${d.bucket_counts?.RP||0}`;
}

function renderVerdictBars() {
  const counts = DATA.verdict_counts || {};
  const items = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max = items.length ? items[0][1] : 1;
  const root = document.getElementById('verdict-bars');
  root.innerHTML = items.map(([v,n]) => {
    const cls = verdictClass(v);
    const w = Math.max(2, (n/max)*100);
    return `<div class="bar-row"><div class="label" title="${v}">${v}</div>` +
           `<div class="bar"><span class="${cls}" style="width:${w}%"></span></div>` +
           `<div class="n">${n}</div></div>`;
  }).join('') || '<div class="muted">(none)</div>';
}

function renderOverrideTable() {
  const counts = DATA.override_counts || {};
  const items = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const root = document.getElementById('override-table');
  root.innerHTML = items.length
    ? items.map(([k,v]) => `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')
    : '<div class="muted">(no overrides fired)</div>';
}

function populateFilters() {
  // Teams
  const teams = [...new Set(DATA.players.map(p => p.category).filter(Boolean))].sort();
  const sel = document.getElementById('f-team');
  teams.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });

  // Verdicts
  const verdicts = [...new Set(DATA.players.map(p => p.verdict).filter(Boolean))].sort();
  const vsel = document.getElementById('f-verdict');
  vsel.size = Math.min(6, Math.max(3, verdicts.length));
  verdicts.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; vsel.appendChild(o); });

  // Overrides
  const overrides = [...new Set(DATA.players.map(p => p.override_tag).filter(Boolean))].sort();
  const osel = document.getElementById('f-override');
  osel.size = Math.min(6, Math.max(2, overrides.length || 2));
  overrides.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; osel.appendChild(o); });
}

function renderThead() {
  const tr = document.getElementById('thead-row');
  tr.innerHTML = COLS.map(c => {
    const arrow = STATE.sort_k === c.k ? (STATE.sort_dir > 0 ? '▲' : '▼') : '';
    return `<th data-k="${c.k}">${c.h}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');
  tr.querySelectorAll('th').forEach(th => {
    th.onclick = () => {
      const k = th.dataset.k;
      if (STATE.sort_k === k) STATE.sort_dir = -STATE.sort_dir;
      else { STATE.sort_k = k; STATE.sort_dir = 1; }
      renderTable();
    };
  });
}

function filteredRows() {
  return DATA.players.filter(p => {
    if (p.resolved === false) return false;
    if (STATE.f_team && p.category !== STATE.f_team) return false;
    if (STATE.f_bucket && p.bucket !== STATE.f_bucket) return false;
    if (STATE.f_verdicts.size && !STATE.f_verdicts.has(p.verdict)) return false;
    if (STATE.f_overrides.size && !STATE.f_overrides.has(p.override_tag)) return false;
    if (STATE.f_name && !(p.name||'').toLowerCase().includes(STATE.f_name.toLowerCase())) return false;
    return true;
  });
}

function renderTable() {
  renderThead();
  const rows = filteredRows();
  const col = COLS.find(c => c.k === STATE.sort_k);
  const dir = STATE.sort_dir;
  rows.sort((a,b) => {
    let av = a[STATE.sort_k], bv = b[STATE.sort_k];
    const aNull = av === null || av === undefined;
    const bNull = bv === null || bv === undefined;
    if (aNull && bNull) return 0;
    if (aNull) return 1;
    if (bNull) return -1;
    if (col && col.type === 'num') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });

  const tb = document.getElementById('tbody');
  tb.innerHTML = rows.map(p => {
    const tds = COLS.map(c => {
      const v = p[c.k];
      if (c.k === 'verdict') {
        const cls = verdictClass(v);
        const ov = p.override_tag ? `<span class="ov-tag">${p.override_tag}</span>` : '';
        return `<td><span class="v-pill ${cls}">${v||'—'}</span>${ov}</td>`;
      }
      if (c.k === 'bucket') return `<td class="b-${v}">${v||'—'}</td>`;
      if (c.k === 'arche_traj') {
        const tc = (v||'').includes('UP') ? 'traj-up' : (v||'').includes('DOWN') ? 'traj-down' : 'traj-flat';
        return `<td class="${tc}">${v||'—'}</td>`;
      }
      if (c.k === 'rationale') return `<td class="rationale">${v||''}</td>`;
      return `<td>${fmt(v, c.type)}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  document.getElementById('player-count').textContent = `${rows.length} shown / ${DATA.n_players} total`;
}

function wireFilters() {
  document.getElementById('f-team').onchange = e => { STATE.f_team = e.target.value; renderTable(); };
  document.querySelectorAll('#f-bucket button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#f-bucket button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      STATE.f_bucket = b.dataset.v;
      renderTable();
    };
  });
  document.querySelector('#f-bucket button[data-v=""]').classList.add('active');
  document.getElementById('f-verdict').onchange = e => {
    STATE.f_verdicts = new Set([...e.target.selectedOptions].map(o => o.value));
    renderTable();
  };
  document.getElementById('f-override').onchange = e => {
    STATE.f_overrides = new Set([...e.target.selectedOptions].map(o => o.value));
    renderTable();
  };
  document.getElementById('f-name').oninput = e => { STATE.f_name = e.target.value; renderTable(); };
  document.getElementById('f-reset').onclick = () => {
    STATE = { sort_k:'model_rank', sort_dir:1, f_team:'', f_bucket:'', f_verdicts:new Set(), f_overrides:new Set(), f_name:'' };
    document.getElementById('f-team').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-verdict').selectedIndex = -1;
    document.getElementById('f-override').selectedIndex = -1;
    document.querySelectorAll('#f-bucket button').forEach(x => x.classList.remove('active'));
    document.querySelector('#f-bucket button[data-v=""]').classList.add('active');
    renderTable();
  };
}

fetch('triangulate_data.json?_=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(d => {
    DATA = d;
    document.getElementById('content').style.display = '';
    renderMeta();
    renderVerdictBars();
    renderOverrideTable();
    populateFilters();
    wireFilters();
    renderTable();
  })
  .catch(e => {
    document.getElementById('err').style.display = '';
    document.getElementById('err').textContent =
      'Failed to load triangulate_data.json: ' + e.message +
      ' — run: python scripts/xfp/run_triangulate.py --names-file data/research/triangulate_universe/all_teams_roster.csv --json-out xfp-model/docs/triangulate_data.json';
    document.getElementById('meta').textContent = 'error';
  });
</script>
</body></html>
